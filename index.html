<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星落接接乐</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">MINI GAME</p>
        <h1>星落接接乐</h1>
        <p class="intro">
          左右移动接住星星，避开炸弹。60 秒结束，分数越高越好。
        </p>
        <div class="panel">
          <div class="stat">
            <span>得分</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>生命</span>
            <strong id="lives">3</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="time">60</strong>
          </div>
        </div>
        <div class="actions">
          <button id="startBtn" class="primary">开始游戏</button>
          <p id="message">按方向键移动，接住星星就能得分。</p>
        </div>
      </section>

      <section class="game-shell">
        <canvas id="gameCanvas" width="420" height="720"></canvas>
        <div class="touch-controls">
          <button id="leftBtn" aria-label="向左移动">←</button>
          <button id="rightBtn" aria-label="向右移动">→</button>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
