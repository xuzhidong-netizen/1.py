<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小游戏大厅</title>
    <meta
      name="description"
      content="4399 风格单机游戏厅首页，点击游戏即可跳转到独立页面开始玩。"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="home-page">
    <main class="home-shell">
      <section class="home-hero">
        <div>
          <p class="eyebrow">MINI ARCADE</p>
          <h1>单机游戏厅</h1>
          <p class="hero-copy">
            参照经典小游戏站点的感觉重做了首页。先看游戏列表，选中后跳转到独立游戏页开始玩，不再挤在一个页面里。
          </p>
          <div class="hero-actions">
            <button class="primary" type="button" data-open-game="star">马上开玩</button>
            <button class="ghost" type="button" data-random-game>随机热门</button>
          </div>
        </div>
          <div class="hero-stats">
            <div class="hero-stat-card">
              <span>游戏总数</span>
              <strong id="homeTotalGames">10</strong>
            </div>
            <div class="hero-stat-card">
              <span>当前模式</span>
              <strong>单机</strong>
            </div>
          <div class="hero-stat-card">
            <span>进入方式</span>
            <strong>点卡跳转</strong>
          </div>
        </div>
      </section>

      <section class="discover-panel">
        <div class="discover-main">
          <div class="discover-head">
            <div>
              <p class="eyebrow">4399 STYLE</p>
              <h2>按分类找游戏</h2>
            </div>
            <label class="search-box">
              <span>搜索游戏</span>
              <input
                id="gameSearchInput"
                type="search"
                placeholder="输入名字、类型或玩法关键词"
                autocomplete="off"
              />
            </label>
          </div>
          <div class="category-strip" id="homeCategoryStrip"></div>
        </div>
        <aside class="ranking-panel">
          <p class="panel-tag">HOT RANK</p>
          <h2>热门排行</h2>
          <div id="hotRankingList" class="ranking-list"></div>
        </aside>
      </section>

      <section class="featured-banner">
        <div>
          <p class="panel-tag" id="featuredTag">HOT TODAY</p>
          <h2 id="featuredTitle">今日热门游戏</h2>
          <p id="featuredText">点开即跳转到专属游玩页，避免首页过长，也更接近小游戏站的使用方式。</p>
        </div>
        <button class="primary" id="featuredPlayBtn" type="button" data-open-game="breakout">先玩打砖块</button>
      </section>

      <section class="gallery-toolbar">
        <div>
          <p class="eyebrow">GAME HALL</p>
          <h2>全部游戏</h2>
          <p class="panel-message" id="gallerySummary">点按钮即可跳转到独立游玩页。</p>
        </div>
        <div class="hero-stats gallery-stats">
          <div class="hero-stat-card">
            <span>当前筛选</span>
            <strong id="currentFilterLabel">全部</strong>
          </div>
          <div class="hero-stat-card">
            <span>可玩游戏</span>
            <strong id="visibleGameCount">10</strong>
          </div>
        </div>
      </section>

      <section class="game-gallery" id="gameGallery">
      </section>
    </main>
    <script src="./catalog.js"></script>
    <script src="./home.js"></script>
  </body>
</html>
